<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - SQL优化平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="min-h-screen flex items-center justify-center gradient-bg py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white rounded-2xl shadow-2xl p-10">
            <!-- Logo和标题 -->
            <div class="text-center">
                <div class="mx-auto h-16 w-16 bg-gradient-to-r from-purple-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                    <span class="material-icons text-white text-4xl">person_add</span>
                </div>
                <h2 class="mt-6 text-3xl font-extrabold text-gray-900">创建账户</h2>
                <p class="mt-2 text-sm text-gray-600">开始您的SQL优化之旅</p>
            </div>

            <!-- 注册表单 -->
            <form class="mt-8 space-y-6" action="dashboard.html" method="get">
                <div class="rounded-md shadow-sm space-y-4">
                    <!-- 用户名输入 -->
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-icons text-gray-400">person</span>
                            </div>
                            <input id="username" name="username" type="text" required 
                                class="appearance-none relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-150"
                                placeholder="johndoe">
                        </div>
                    </div>

                    <!-- 邮箱输入 -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">邮箱地址</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-icons text-gray-400">email</span>
                            </div>
                            <input id="email" name="email" type="email" required 
                                class="appearance-none relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-150"
                                placeholder="your.email@example.com">
                        </div>
                    </div>

                    <!-- 密码输入 -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-icons text-gray-400">lock</span>
                            </div>
                            <input id="password" name="password" type="password" required 
                                class="appearance-none relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-150"
                                placeholder="至少8个字符">
                        </div>
                        <p class="mt-1 text-xs text-gray-500">密码应包含大小写字母和数字</p>
                    </div>

                    <!-- 确认密码输入 -->
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <span class="material-icons text-gray-400">lock_outline</span>
                            </div>
                            <input id="confirm-password" name="confirm-password" type="password" required 
                                class="appearance-none relative block w-full pl-10 pr-3 py-3 border border-gray-300 placeholder-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition duration-150"
                                placeholder="再次输入密码">
                        </div>
                    </div>
                </div>

                <!-- 服务条款 -->
                <div class="flex items-center">
                    <input id="terms" name="terms" type="checkbox" required
                        class="h-4 w-4 text-purple-600 focus:ring-purple-500 border-gray-300 rounded">
                    <label for="terms" class="ml-2 block text-sm text-gray-700">
                        我同意
                        <a href="#" class="text-purple-600 hover:text-purple-500 transition">服务条款</a>
                        和
                        <a href="#" class="text-purple-600 hover:text-purple-500 transition">隐私政策</a>
                    </label>
                </div>

                <!-- 注册按钮 -->
                <div>
                    <button type="submit" 
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition duration-150 shadow-lg">
                        <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                            <span class="material-icons text-purple-200">how_to_reg</span>
                        </span>
                        创建账户
                    </button>
                </div>

                <!-- 登录链接 -->
                <div class="text-center">
                    <p class="text-sm text-gray-600">
                        已有账户？
                        <a href="login.html" class="font-medium text-purple-600 hover:text-purple-500 transition">立即登录</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
